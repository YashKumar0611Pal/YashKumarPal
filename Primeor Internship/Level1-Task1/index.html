<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Internship Project</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Navigation -->

    <nav>

        <div class="logo">
            MyWebsite
        </div>

        <ul>

            <li><a href="#">Home</a></li>

            <li><a href="#">About</a></li>

            <li><a href="#">Contact</a></li>

        </ul>

    </nav>

    <!-- Hero Section -->

    <section class="hero">

        <h1>Welcome to My Internship Project</h1>

        <p>
            This responsive webpage is built using HTML and CSS.
            It includes a navigation bar, image, contact form,
            hover effects, and a modern layout.
        </p>

        <img src="images/image.jpg" alt="Website Image">

    </section>

    <!-- Contact Form -->

    <section class="contact">

        <h2>Contact Us</h2>

        <form>

            <input type="text" placeholder="Enter your Name" required>

            <input type="email" placeholder="Enter your Email" required>

            <textarea placeholder="Enter your Message"></textarea>

            <button type="submit">
                Submit
            </button>

        </form>

    </section>

    <!-- Footer -->

    <footer>

        <p>
            © 2026 My Internship Project | Designed using HTML & CSS
        </p>

    </footer>

</body>
</html>
